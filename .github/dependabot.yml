# GitHub Dependabot configuration for automated dependency updates
version: 2
updates:
  # Disabled to stop automatic dependency update PRs before archiving the repo.
  # GitHub Docs: setting open-pull-requests-limit to 0 temporarily disables
  # Dependabot version updates for the package ecosystem while keeping the
  # configuration file valid.
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "monthly"
      time: "09:00"
    target-branch: "main"
    assignees:
      - "ansh-info"
    commit-message:
      prefix: "deps"
      include: "scope"
    labels:
      - "dependencies"
      - "python"
    open-pull-requests-limit: 0
    # Group minor and patch updates
    groups:
      minor-and-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
      time: "09:00"
    target-branch: "main"
    assignees:
      - "ansh-info"
    commit-message:
      prefix: "ci"
      include: "scope"
    labels:
      - "dependencies"
      - "github-actions"
    open-pull-requests-limit: 0

  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "monthly"
      time: "09:00"
    target-branch: "main"
    assignees:
      - "ansh-info"
    commit-message:
      prefix: "deps"
      include: "scope"
    labels:
      - "dependencies"
      - "npm"
      - "security"
    open-pull-requests-limit: 0
    # Update both package.json and lockfile as needed
    versioning-strategy: "increase"

  # Previous optional docker config retained below for easy restoration if needed.
